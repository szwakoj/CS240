site_name: CS 240 - Data Structures and Algorithms

theme:
  name: material
  logo: img/cs240.png
  favicon: img/cs240.png
  #custom_dir: overrides
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/eye
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/eye-outline
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.expand
  
markdown_extensions:
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - admonition
  

extra_javascript:
  - javascript/wcag_fixes.js
  - javascript/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Syllabus: syllabus.md
  - Schedule: schedule.md
  - Glossary: glossary.md
  - Lessons:
    - Introduction: lessons/1_introduction.md
    - Reviewing C: lessons/2_reviewing_c.md
    - Runtime Basics: lessons/3_runtime.md
    - Big O: lessons/4_big_o.md
    - Basic DS: lessons/5_data_structs1.md
    - DS - Linear I: lessons/6_data_structs2.md
    - DS - Linear II: lessons/7_data_structs3.md
  - Labs:
    - Lab 1: labs/1_insertion_breakdown.md
    - Lab 2: labs/2_array_lab.md

  - Homework:
    - How To Hand In: homework/how_to_hand_in.md
    - Installing Software: homework/gcc_install.md
    - Homework 1 (Due 2/27/26): homework/1_c_review.md
    - Homework 2 (Due 3/13/26): homework/2_test_review.md
    - Homework 3 (Due 4/7/26): homework/3_dynamic_stocks.md